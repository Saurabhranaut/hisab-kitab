<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Kharcha Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@500;700&family=IBM+Plex+Mono:wght@400;600;700&family=Inter:wght@400;500;600&display=swap');

  :root{
    --ink:#1B2A4A;
    --paper:#F1E7CF;
    --paper-dark:#E4D6B8;
    --paper-line:#cbb98f;
    --stamp-red:#A93226;
    --stamp-green:#1E6F46;
    --gold:#B8892B;
    --muted:#6B5C43;
    --white:#fffdf8;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    background-image:repeating-linear-gradient(180deg, transparent, transparent 27px, var(--paper-line) 28px);
    font-family:'Inter',system-ui,sans-serif;
    color:var(--ink);
    min-height:100vh;
    padding-bottom:40px;
  }
  .mono{font-family:'IBM Plex Mono',monospace;}
  .slab{font-family:'Roboto Slab',serif;}

  .cover{
    background:var(--ink); color:var(--white);
    padding:22px 18px 26px; border-bottom:6px solid var(--gold);
    position:relative; overflow:hidden;
  }
  .cover::after{
    content:""; position:absolute; right:-30px; top:-30px;
    width:140px;height:140px; border:2px dashed rgba(255,255,255,0.15); border-radius:50%;
  }
  .cover h1{font-size:1.5rem; margin:0 0 4px; letter-spacing:0.3px;}
  .cover .sub{font-size:0.8rem; opacity:0.75; margin:0;}
  .who-row{display:flex; gap:8px; margin-top:16px; flex-wrap:wrap;}
  .who-chip{
    display:flex; align-items:center; gap:6px;
    background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.18);
    padding:5px 10px 5px 5px; border-radius:999px; font-size:0.78rem; cursor:pointer; transition:all .15s;
  }
  .who-chip.active{background:var(--gold); border-color:var(--gold); color:var(--ink); font-weight:600;}
  .avatar{
    width:22px;height:22px; border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:0.68rem; font-weight:700; font-family:'IBM Plex Mono',monospace; color:#fff; flex:none;
  }

  .wrap{max-width:520px; margin:0 auto; padding:16px;}

  .hero{
    background:var(--white); border:1px solid var(--paper-line); border-radius:14px;
    padding:22px; text-align:center; box-shadow:0 3px 0 var(--paper-line);
    margin-top:-14px; position:relative; z-index:2;
  }
  .hero .label{font-size:0.72rem; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); margin-bottom:8px;}
  .hero .amount{font-size:2.1rem; font-weight:700;}
  .amount.pos{color:var(--stamp-green);} .amount.neg{color:var(--stamp-red);} .amount.zero{color:var(--muted);}
  .hero .hint{font-size:0.78rem; color:var(--muted); margin-top:6px;}

  .card{background:var(--white); border:1px solid var(--paper-line); border-radius:12px; padding:16px; margin-top:16px;}
  .card h2{font-size:0.95rem; margin:0 0 4px; display:flex; align-items:center; gap:8px; color:var(--ink);}
  .card .sub-note{font-size:0.75rem; color:var(--muted); margin:0 0 12px;}
  .card h2 .num{
    font-family:'IBM Plex Mono',monospace; background:var(--paper-dark); color:var(--ink);
    width:22px;height:22px; border-radius:6px; display:inline-flex; align-items:center;justify-content:center; font-size:0.75rem;
  }

  label{font-size:0.78rem; color:var(--muted); display:block; margin:10px 0 4px;}
  input[type=text], input[type=number]{
    width:100%; padding:10px 12px; border:1px solid var(--paper-line); border-radius:8px;
    font-size:0.95rem; font-family:'Inter',sans-serif; background:var(--paper);
  }
  input:focus{outline:2px solid var(--gold); outline-offset:1px;}

  .split-grid{display:flex; flex-wrap:wrap; gap:8px; margin-top:6px;}
  .split-pill{
    display:flex; align-items:center; gap:6px; border:1px solid var(--paper-line);
    padding:6px 10px; border-radius:999px; font-size:0.82rem; cursor:pointer; background:var(--paper); user-select:none;
  }
  .split-pill.checked{background:var(--ink); color:#fff; border-color:var(--ink);}
  .split-pill input{display:none;}

  button.primary{
    width:100%; margin-top:16px; padding:12px; background:var(--stamp-green); color:#fff;
    border:none; border-radius:9px; font-size:0.95rem; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif;
  }
  button.primary:disabled{opacity:0.5;}
  button.primary:active{transform:translateY(1px);}

  .pair-row{
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 0; border-bottom:1px dashed var(--paper-line); font-size:0.88rem; gap:10px;
  }
  .pair-row:last-child{border-bottom:none;}
  .pair-dir{color:var(--gold); font-weight:700; flex:none;}
  .pair-amt{font-family:'IBM Plex Mono',monospace; font-weight:700; white-space:nowrap;}
  .pair-amt.due{color:var(--stamp-red);}
  .pair-amt.get{color:var(--stamp-green);}

  .entry{display:flex; gap:12px; align-items:flex-start; padding:12px 0; border-bottom:1px solid var(--paper-dark);}
  .entry:last-child{border-bottom:none;}
  .stamp{
    width:36px;height:36px; border-radius:50%; border:2px dashed var(--gold);
    display:flex;align-items:center;justify-content:center; font-family:'IBM Plex Mono',monospace;
    font-weight:700; font-size:0.72rem; color:var(--ink); transform:rotate(-6deg); flex:none; background:var(--paper);
  }
  .entry-body{flex:1;}
  .entry-desc{font-weight:600; font-size:0.9rem;}
  .entry-meta{font-size:0.72rem; color:var(--muted); margin-top:2px;}
  .entry-amt{font-family:'IBM Plex Mono',monospace; font-weight:700; white-space:nowrap;}
  .entry-del{background:none;border:none;color:var(--stamp-red); font-size:0.7rem; cursor:pointer; margin-top:4px; padding:0;}

  .empty{text-align:center; color:var(--muted); font-size:0.85rem; padding:20px 0;}
  .footer-note{text-align:center; font-size:0.7rem; color:var(--muted); margin-top:20px; line-height:1.5;}

  .overlay{
    position:fixed; inset:0; background:rgba(27,42,74,0.92);
    display:flex; align-items:center; justify-content:center; z-index:50; padding:20px;
  }
  .overlay-card{
    background:var(--paper); border-radius:14px; padding:26px 22px;
    max-width:340px; width:100%; text-align:center; border:1px solid var(--gold);
  }
  .overlay-card h2{margin-top:0; font-size:1.1rem;}
  .overlay-card p{font-size:0.82rem; color:var(--muted);}
  .id-btn{
    display:block; width:100%; padding:12px; margin:8px 0 0; border-radius:9px;
    border:1px solid var(--paper-line); background:var(--white); font-size:0.95rem;
    cursor:pointer; font-family:'Inter',sans-serif; font-weight:600;
  }
  .id-btn:active{background:var(--paper-dark);}

  .toast{
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:#fff; padding:10px 18px; border-radius:999px;
    font-size:0.82rem; opacity:0; pointer-events:none; transition:opacity .25s; z-index:60;
  }
  .toast.show{opacity:1;}

  .reset-link{
    display:block; text-align:center; font-size:0.72rem; color:var(--muted);
    margin-top:10px; text-decoration:underline; cursor:pointer; background:none; border:none;
  }
</style>
</head>
<body>

<div class="cover">
  <h1 class="slab">Hisab Kitaab</h1>
  <p class="sub">Saurabh • Rakesh • Deepak • Sunil — saanjha kharcha, saaf hisab</p>
  <div class="who-row" id="whoRow"></div>
</div>

<div class="wrap">
  <div class="hero">
    <div class="label">Aapka Overall Balance</div>
    <div class="amount mono" id="heroAmount">₹0</div>
    <div class="hint" id="heroHint">Loading...</div>
  </div>

  <div class="card">
    <h2><span class="num">1</span> Naya Kharcha Jodo</h2>
    <label for="descInput">Kis cheez ka kharcha?</label>
    <input type="text" id="descInput" placeholder="e.g. Sabzi, Bijli bill, Wifi">
    <label for="amtInput">Kitna (₹)?</label>
    <input type="number" id="amtInput" placeholder="0" min="0" step="1">
    <label>Kisne diya paisa?</label>
    <div class="split-grid" id="paidByGrid"></div>
    <label>Kis-kis mein baante?</label>
    <div class="split-grid" id="splitGrid"></div>
    <button class="primary" id="addBtn">Kharcha Jodo</button>
  </div>

  <div class="card">
    <h2><span class="num">2</span> Kisko Kitna Dena/Lena Hai</h2>
    <div id="pairList"></div>
  </div>

  <div class="card">
    <h2><span class="num">3</span> Poora Khata</h2>
    <div id="ledgerList"></div>
  </div>

  <button class="reset-link" id="resetBtn">Sab kharche reset karo</button>
</div>

<div class="overlay" id="onboardOverlay" style="display:none;">
  <div class="overlay-card">
    <h2 class="slab">Aap kaun ho?</h2>
    <p>Apna naam chuno taaki hum aapka balance sahi dikha sakein.</p>
    <div id="onboardBtns"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const ROOMMATES = ["Saurabh", "Rakesh", "Deepak", "Sunil"];
const COLORS = ["#A93226", "#1E6F46", "#B8892B", "#1B2A4A"];

let expenses = [];
let currentId = null;

function initials(name){ return name.slice(0,2).toUpperCase(); }

function getIdFromUrl(){
  const params = new URLSearchParams(window.location.search);
  const n = parseInt(params.get("id"), 10);
  return (!isNaN(n) && n >= 0 && n < ROOMMATES.length) ? n : null;
}

function setIdInUrl(id){
  const url = new URL(window.location.href);
  url.searchParams.set("id", id);
  window.history.replaceState({}, "", url);
}

function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(()=> t.classList.remove("show"), 2000);
}

function renderWhoRow(){
  const row = document.getElementById("whoRow");
  row.innerHTML = "";
  ROOMMATES.forEach((name, i) => {
    const chip = document.createElement("div");
    chip.className = "who-chip" + (i === currentId ? " active" : "");
    chip.innerHTML = `<span class="avatar" style="background:${COLORS[i]}">${initials(name)}</span>${name}`;
    chip.onclick = () => { currentId = i; setIdInUrl(i); renderAll(); };
    row.appendChild(chip);
  });
}

function renderPickers(){
  const paidByGrid = document.getElementById("paidByGrid");
  const splitGrid = document.getElementById("splitGrid");
  paidByGrid.innerHTML = "";
  splitGrid.innerHTML = "";

  ROOMMATES.forEach((name, i) => {
    const pill = document.createElement("label");
    pill.className = "split-pill" + (i === currentId ? " checked" : "");
    pill.innerHTML = `<input type="radio" name="paidBy" value="${i}" ${i===currentId?"checked":""}> ${name}`;
    pill.querySelector("input").addEventListener("change", () => {
      document.querySelectorAll("#paidByGrid .split-pill").forEach(p => p.classList.remove("checked"));
      pill.classList.add("checked");
    });
    paidByGrid.appendChild(pill);
  });

  ROOMMATES.forEach((name, i) => {
    const pill = document.createElement("label");
    pill.className = "split-pill checked";
    pill.innerHTML = `<input type="checkbox" value="${i}" checked> ${name}`;
    pill.querySelector("input").addEventListener("change", (e) => {
      pill.classList.toggle("checked", e.target.checked);
    });
    splitGrid.appendChild(pill);
  });
}

// owes[i][j] = total amount person i owes person j, summed straight from
// bills where j paid and i was part of the split. NOT netted against
// owes[j][i] -- both directions can exist at once, exactly as they came
// from real bills, so it stays easy to trace "kisko kyu dena hai".
function computeOwesMatrix(){
  const owes = ROOMMATES.map(() => ROOMMATES.map(() => 0));
  expenses.forEach(exp => {
    const share = exp.amount / exp.splitAmong.length;
    exp.splitAmong.forEach(idx => {
      if (idx !== exp.paidBy) owes[idx][exp.paidBy] += share;
    });
  });
  return owes;
}

function renderHero(owes){
  let iOwe = 0, owedToMe = 0;
  ROOMMATES.forEach((_, j) => {
    if (j === currentId) return;
    iOwe += owes[currentId][j];
    owedToMe += owes[j][currentId];
  });
  const net = owedToMe - iOwe;
  const rounded = Math.round(net);
  const amountEl = document.getElementById("heroAmount");
  const hintEl = document.getElementById("heroHint");

  if (Math.abs(rounded) < 1){
    amountEl.textContent = "₹0"; amountEl.className = "amount mono zero";
    hintEl.textContent = "Overall aap settled ho";
  } else if (rounded > 0){
    amountEl.textContent = "+₹" + rounded; amountEl.className = "amount mono pos";
    hintEl.textContent = "Overall aapko milna hai (neeche pair-wise detail dekho)";
  } else {
    amountEl.textContent = "−₹" + Math.abs(rounded); amountEl.className = "amount mono neg";
    hintEl.textContent = "Overall aapko dena hai (neeche pair-wise detail dekho)";
  }
}

function renderPairs(owes){
  const list = document.getElementById("pairList");
  list.innerHTML = "";
  let any = false;

  ROOMMATES.forEach((name, j) => {
    if (j === currentId) return;
    const iOweThem = Math.round(owes[currentId][j]);
    const theyOweMe = Math.round(owes[j][currentId]);

    if (iOweThem >= 1){
      any = true;
      const row = document.createElement("div");
      row.className = "pair-row";
      row.innerHTML = `<span><span class="pair-dir">←</span> Aapne ${name} ko dena hai</span><span class="pair-amt due">₹${iOweThem}</span>`;
      list.appendChild(row);
    }
    if (theyOweMe >= 1){
      any = true;
      const row = document.createElement("div");
      row.className = "pair-row";
      row.innerHTML = `<span><span class="pair-dir">→</span> ${name} aapko dega</span><span class="pair-amt get">₹${theyOweMe}</span>`;
      list.appendChild(row);
    }
  });

  if (!any){
    list.innerHTML = `<div class="empty">Kisi ke saath koi baaki hisab nahi hai.</div>`;
  }
}

function renderLedger(){
  const list = document.getElementById("ledgerList");
  list.innerHTML = "";

  if (expenses.length === 0){
    list.innerHTML = `<div class="empty">Abhi tak koi kharcha nahi joda gaya.</div>`;
    return;
  }

  [...expenses].reverse().forEach(exp => {
    const entry = document.createElement("div");
    entry.className = "entry";
    const share = Math.round(exp.amount / exp.splitAmong.length);
    entry.innerHTML = `
      <div class="stamp" style="border-color:${COLORS[exp.paidBy]}">${initials(ROOMMATES[exp.paidBy])}</div>
      <div class="entry-body">
        <div class="entry-desc">${escapeHtml(exp.desc)}</div>
        <div class="entry-meta">${ROOMMATES[exp.paidBy]} ne diya • ${exp.splitAmong.length} logon mein baata (₹${share}/person)</div>
        <button class="entry-del" data-id="${exp._id}" data-user-id="${exp.user_id}">Delete</button>
      </div>
      <div class="entry-amt">₹${exp.amount}</div>
    `;
    list.appendChild(entry);
  });

  list.querySelectorAll(".entry-del").forEach(btn => {
    btn.style.display = (parseInt(btn.getAttribute("data-user-id"), 10) === currentId) ? "inline-block" : "none";
    btn.addEventListener("click", async () => {
      const id = btn.getAttribute("data-id");
      const user_id = btn.getAttribute("data-user-id");
      try{
        // user_id ko query param mein bhejna zaroori hai, warna backend
        // Number(undefined) = NaN compare karega aur hamesha 403 dega
        const res = await fetch(`/api/expenses/${encodeURIComponent(id)}?user_id=${encodeURIComponent(user_id)}`, { method: "DELETE" });
        if(!res.ok){
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || "delete failed");
        }
        await loadExpenses();
        renderAll();
        showToast("Kharcha hataya gaya");
      }catch(e){
        showToast("Delete nahi ho paya, dobara try karo");
      }
    });
  });
}

function escapeHtml(str){
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

function renderAll(){
  const owes = computeOwesMatrix();
  renderWhoRow();
  renderPickers();
  renderHero(owes);
  renderPairs(owes);
  renderLedger();
}

async function loadExpenses(){
  try{
    const res = await fetch('/api/expenses');
    if(!res.ok) throw new Error("load failed");
    const data = await res.json();
    expenses = data.expenses || [];
  }catch(e){
    expenses = [];
    showToast("Server se data load nahi ho paya");
  }
}

async function addExpense(){
  const desc = document.getElementById("descInput").value.trim();
  const amt = parseFloat(document.getElementById("amtInput").value);
  const paidByInput = document.querySelector('input[name="paidBy"]:checked');
  const splitInputs = [...document.querySelectorAll('#splitGrid input[type="checkbox"]:checked')];

  if(!desc){ showToast("Kharche ka naam likho"); return; }
  if(!amt || amt <= 0){ showToast("Sahi amount daalo"); return; }
  if(!paidByInput){ showToast("Kisne diya, wo chuno"); return; }
  if(splitInputs.length === 0){ showToast("Kam se kam ek member chuno"); return; }

  const addBtn = document.getElementById("addBtn");
  addBtn.disabled = true;

  const exp = {
    desc,
    amount: amt,
    user_id: currentId,
    paidBy: parseInt(paidByInput.value, 10),
    splitAmong: splitInputs.map(i => parseInt(i.value, 10))
  };

  try{
    const res = await fetch('/api/expenses', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(exp)
    });
    if(!res.ok){
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || "add failed");
    }
    document.getElementById("descInput").value = "";
    document.getElementById("amtInput").value = "";
    await loadExpenses();
    renderAll();
    showToast("Kharcha jud gaya!");
  }catch(e){
    showToast("Add nahi ho paya, dobara try karo");
  }finally{
    addBtn.disabled = false;
  }
}

function showOnboarding(){
  const overlay = document.getElementById("onboardOverlay");
  const btns = document.getElementById("onboardBtns");
  btns.innerHTML = "";
  ROOMMATES.forEach((name, i) => {
    const b = document.createElement("button");
    b.className = "id-btn";
    b.textContent = name;
    b.onclick = () => {
      currentId = i;
      setIdInUrl(i);
      overlay.style.display = "none";
      renderAll();
    };
    btns.appendChild(b);
  });
  overlay.style.display = "flex";
}

async function init(){
  await loadExpenses();
  const urlId = getIdFromUrl();
  if (urlId === null){
    showOnboarding();
    currentId = 0;
  } else {
    currentId = urlId;
  }
  renderAll();

  document.getElementById("addBtn").addEventListener("click", addExpense);
  document.getElementById("resetBtn").addEventListener("click", async () => {
    if(confirm("Sach mein sab kharche delete karne hain? Yeh sabke liye delete ho jayega.")){
      for (const exp of [...expenses]){
        await fetch(`/api/expenses/${encodeURIComponent(exp._id)}?user_id=${exp.user_id}`, { method: "DELETE" });
      }
      await loadExpenses();
      renderAll();
      showToast("Sab reset ho gaya");
    }
  });
}

init();
</script>
</body>
</html>
